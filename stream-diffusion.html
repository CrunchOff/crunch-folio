<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" href="fonts/DINdong.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="icon" type="image/png" href="https://www.dropbox.com/scl/fi/4xgz9aviopyk8cpy60zdq/FAVICON.png?rlkey=so55r5o9ldku50tmo5ptl0yhv&raw=1">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="project-page-styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
  <title>CrunchFolio</title>
  <script src="processing/p5.min.js"></script>
  <script src="processing/sketch.js"></script>
</head>
<body>
  <header><!-- Header content is loaded from header.js --></header><script src="header.js"></script>

  <main>

    <section class="project-content">
      <div class="left-container">
        <video src="https://www.dropbox.com/scl/fi/rt08zkyt1o5qgwkil49df/render-reel.mp4?rlkey=7hsg9tulsxygac9q7s87z1551&raw=1" muted controls class="video-content"></video>
        <video src="https://www.dropbox.com/scl/fi/yf2gu3df2kpz24pgutlsj/cyberpunk-nature.mp4?rlkey=oyly56p0iprpvual1lg79nsjt&raw=1" muted controls class="video-content"></video>
      </div>

      <div class="right-container">
        <h1>StreamDiffusion video-to-video</h1>
        <br>
        <p>
        J'ai utilisé l'outil StreamDiffusion pour créer de nouvelles vidéos à partir d'une vidéo source.
        <br>
        <br>
        Cet outil permet un rendu en temps réel guidé par un prompt, ce qui m'a permis de générer rapidement de nouveaux contenus vidéo.
        </p>
        <br>
        <br>
        <a href="https://github.com/cumulo-autumn/StreamDiffusion" target="_blank" class="link-style">
          StreamDiffusion Github
        </a>
      </div>

    </section>

    <!-- script pour les vidéos -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
          const videos = document.querySelectorAll('video');

          videos.forEach(video => {
            if ('playsInline' in video) {
              video.playsInline = true;
            } else {
              video.webkitPlaysInline = true;
            }

            video.play().catch(error => {
              // Si la lecture automatique échoue, affichez un message d'erreur ou effectuez une action de secours
              console.error('Error in autoplay:', error);
            });
          });
        });
    </script>

  </main>

  <footer><!-- Footer content is loaded from footer.js --></footer><script src="footer.js"></script>
</body>
</html>
